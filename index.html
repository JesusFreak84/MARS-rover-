<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NASA's APOD Photo Viewer</title>
    <link rel="stylesheet" href="apod.css">
</head>

<body>
    <h1>NASA Photo Viewer</h1>
    
    <!-- Tab Selection -->
    <div id="tab-selector">
        <button id="apod-tab" class="tab-button active">APOD</button>
        <button id="mars-tab" class="tab-button">Mars Rovers</button>
    </div>
    
    <!-- APOD Section -->
    <div id="apod-section" class="content-section active">
        <h2>Astronomy Picture Of the Day</h2>
        <div>
            <label for="date">Enter date:</label>
            <input type="text" name="date" id="date">
            <input type="button" id="view_button" value="View">
        </div>
        <div>
            <h3 id="apod-title"></h3>
            <div id="apod-display"></div>
            <p id="apod-explanation"></p>
            <p id="apod-msg" class="error"></p>
        </div>
    </div>
    
    <!-- Mars Perseverance Section -->
    <div id="mars-section" class="content-section">
        <h2>Perseverance Mars Rover Photos</h2>
        <div>
            <input type="button" id="mars-view-button" value="View Latest Photos">
        </div>
        <div>
            <h2 id="mars-title"></h2>
            <div id="gallery"></div>
            <p id="mars-date"></p>
            <p id="mars-camera"></p>
            <p id="mars-msg" class="error"></p>
        </div>
    </div>
    
    <script src="apod.js"></script>
</body>
</html>
